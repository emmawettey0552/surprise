<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Faith Church Youth Association</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f6f9;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:100%;
    margin:auto;
    background:#fff;
}

/* PRELOADER */
#preloader{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#b30000,#7a0000);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

#preloader img{
    width:90px;
    border-radius:12px;
    animation:pulse 1.5s infinite;
    box-shadow:0 0 20px rgba(255,255,255,0.3);
}

.loader-spinner{
    width:45px;
    height:45px;
    margin-top:15px;
    border:4px solid rgba(255,255,255,0.3);
    border-top:4px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.1)}
    100%{transform:scale(1)}
}

/* HEADER */
.header{
    position:relative;
    text-align:center;
    padding:60px 15px 30px;
    background:linear-gradient(135deg,#b30000,#ff4d4d);
    color:white;
}

.header img{
    width:60px;
    position:absolute;
    top:10px;
}

.logo-left{left:10px;}
.logo-right{right:10px;}

.header h1{font-size:18px;}
.header h2{font-size:13px;}

/* MOVER */
.mover-container{
    overflow:hidden;
    background:#800000;
    color:white;
}

.mover{
    white-space:nowrap;
    padding:10px;
    animation:scroll 20s linear infinite;
}

@keyframes scroll{
    from{transform:translateX(100%)}
    to{transform:translateX(-100%)}
}

/* SLIDER */
.banner{
    position:relative;
    width:100%;
    height:220px;
    overflow:hidden;
}

.slides{
    display:flex;
    width:300%;
    height:100%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes slide{
    0%,30%{transform:translateX(0)}
    33%,63%{transform:translateX(-100%)}
    66%,100%{transform:translateX(-200%)}
}

/* PANEL */
.announcement-panel{
    padding:20px;
    text-align:center;
}

.screen{
    background:black;
    color:#00ff9c;
    padding:10px;
    border-radius:8px;
    min-height:50px;
    font-family:monospace;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    background:#b30000;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* BIBLE */
.bible-section{
    padding:20px;
    text-align:center;
}

.verse-box{
    background:#fff3f3;
    border-left:5px solid #b30000;
    padding:10px;
    margin:10px auto;
    border-radius:8px;
    max-width:95%;
}

.verse{font-style:italic;}

/* MEMBERS */
.members{
    padding:20px;
    text-align:center;
}

.member-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.member{
    width:120px;
}

.member img{
    width:90px;
    height:90px;
    border-radius:50%;
}

/* FOOTER */
.footer{
    background:#b30000;
    color:white;
    text-align:center;
    padding:10px;
}
</style></head><body><!-- PRELOADER --><div id="preloader">
    <img src="images.jpeg" alt="logo">
    <div class="loader-spinner"></div>
</div><div class="container"><!-- HEADER --><div class="header">
    <img src="images.jpeg" class="logo-left">
    <img src="images.jpeg" class="logo-right">
    <h1>True Faith Church International</h1>
    <h2>Youth Association</h2>
</div><!-- MOVER --><div class="mover-container">
    <div class="mover" id="mover-text"></div>
</div><!-- SLIDER --><div class="banner">
    <div class="slides">
        <img src="file_00000000386071f6857c6b16586d46ed.png">
        <img src="file_00000000386071f6857c6b16586d46ed.png">
        <img src="file_00000000386071f6857c6b16586d46ed.png">
    </div>
</div><!-- PANEL --><section class="announcement-panel">
    <h3>📢 Announcements</h3>
    <div class="screen"><span id="typewriter"></span></div>
    <button onclick="readAnnouncement()">🔊 Read Announcement</button>
    <button onclick="toggleMusic()">🎵 Play / Pause Music</button>
</section><!-- BIBLE --><section class="bible-section">
    <h3>📖 Bible Insight</h3>
    <div class="verse-box">
        <h4 id="verse-title"></h4>
        <p class="verse" id="verse-text"></p>
        <p id="verse-explain"></p>
    </div>
    <button onclick="readVerse()">🔊 Read Bible</button>
</section><!-- MEMBERS --><div class="members">
    <h3>Executive Members</h3>
    <div class="member-grid">
        <div class="member">
            <img src="member1.jpg">
            <p>Sir John</p>
        </div>
        <div class="member">
            <img src="member2.jpg">
            <p>Mr. Samuel</p>
        </div>
    </div>
</div><div class="footer">© 2026 True Faith Church Youth Association</div></div><!-- AUDIO --><audio id="bg-music" loop>
    <source src="Honhom_Nwom(48k).m4a" type="audio/mp4">
</audio><script>

// PRELOADER REMOVE (FAST 4s)
window.addEventListener('load',()=>{
    setTimeout(()=>{
        document.getElementById('preloader').style.display='none';
    },4000);
});

// MUSIC FIX
const music=document.getElementById("bg-music");
function toggleMusic(){
    if(music.paused){
        music.play().catch(()=>{});
    }else{
        music.pause();
    }
}

// TEXT + VOICE
const texts=["Welcome to True Faith Youth.","Friday Prayer 6PM.","Stay connected and prayerful."];
let i=0,j=0;
function type(){
    let el=document.getElementById("typewriter");
    if(j<texts[i].length){
        el.textContent+=texts[i][j++];
        setTimeout(type,40);
    }else{
        setTimeout(()=>{el.textContent="";j=0;i=(i+1)%texts.length;type();},2000);
    }
}
type();

const bible=[
{
title:"1 Peter 4:7",
text:"The end of all things is near. Be alert and sober so that you may pray.",
explain:"Stay focused, disciplined, and prayerful."
},
{
title:"2 Peter 3:17",
text:"Be on your guard so you are not carried away by error.",
explain:"Protect your faith and stay grounded."
}
];

let b=0;
function showVerse(){
    document.getElementById("verse-title").textContent=bible[b].title;
    document.getElementById("verse-text").textContent=bible[b].text;
    document.getElementById("verse-explain").textContent=bible[b].explain;
    b=(b+1)%bible.length;
}
setInterval(showVerse,5000);
showVerse();

document.getElementById("mover-text").textContent="Welcome ✦ Prayer ✦ Youth ✦ Faith ✦ Jesus";

function readAnnouncement(){
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(document.getElementById("typewriter").textContent));
}

function readVerse(){
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(
        document.getElementById("verse-title").textContent+" "+
        document.getElementById("verse-text").textContent+" "+
        document.getElementById("verse-explain").textContent
    ));
}

</script></body>
</html>
