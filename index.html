<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Faith Church International of Ghana - Youth Association</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6f9;
}

.container {
    width: 90%;
    max-width: 1200px;
    margin: 20px auto;
    background: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border-radius: 12px;
    overflow: hidden;
}

/* HEADER FIX */
.header {
    position: relative;
    text-align: center;
    padding: 70px 20px 40px; /* increased top padding */
    background: linear-gradient(135deg, #b30000, #ff4d4d);
    color: white;
}

/* LOGOS */
.header img {
    width: 70px;
    position: absolute;
    top: 10px;
}

.logo-left { left: 15px; }
.logo-right { right: 15px; }

/* TEXT PUSHED DOWN */
.header h1 {
    font-size: 28px;
    margin-top: 10px;
}

.header h2 {
    font-size: 16px;
}

/* MOVER */
.mover-container {
    overflow: hidden;
    background: #b30000;
    color: #fff;
    padding: 10px 0;
}

.mover {
    white-space: nowrap;
    animation: scrollText 20s linear infinite;
}

.mover span {
    padding-left: 100%;
}

@keyframes scrollText {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* BANNER */
.banner img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.quote-carousel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 10px;
    border-radius: 8px;
}

/* PANEL */
.announcement-panel {
    padding: 40px 20px;
    text-align: center;
}

.screen {
    background: black;
    color: #00ff9c;
    padding: 20px;
    border-radius: 10px;
    font-family: monospace;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #b30000;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* MEMBERS CENTER FIX */
.members {
    padding: 40px 20px;
    text-align: center;
}

.member-grid {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
    margin-top: 20px;
}

.member {
    text-align: center;
    width: 150px;
}

.member img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: #b30000;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <img src="images.jpeg" class="logo-left">
    <img src="images.jpeg" class="logo-right">
    <h1>True Faith Church International of Ghana</h1>
    <h2>Youth Association</h2>
</div>

<!-- MOVER -->
<div class="mover-container">
    <div class="mover">
        <span id="mover-text"></span>
    </div>
</div>

<!-- BANNER -->
<div class="banner">
    <img src="file_00000000386071f6857c6b16586d46ed.png">
    <div class="quote-carousel" id="quote"></div>
</div>

<!-- PANEL -->
<section class="announcement-panel">
    <h2>📢 Youth Announcements</h2>
    <div class="screen">
        <span id="typewriter"></span><span>|</span>
    </div>

    <button onclick="readAnnouncement()">🔊 Read Announcement</button>
</section>

<!-- MEMBERS CENTERED -->
<div class="members">
    <h2>Executive Members</h2>

    <div class="member-grid">
        <div class="member">
            <img src="member1.jpg">
            <h4>John Doe</h4>
            <p>Organizer</p>
        </div>

        <div class="member">
            <img src="member2.jpg">
            <h4>Jane Smith</h4>
            <p>Treasurer</p>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 True Faith Church International of Ghana – Youth Association
</div>

</div>

<script>

/* QUOTES */
const quotes = [
"You are the light of the world – Matthew 5:14",
"Let your light shine – Matthew 5:16",
"I can do all things – Philippians 4:13"
];

let q = 0;
setInterval(()=>{
    document.getElementById("quote").textContent = quotes[q];
    q = (q+1)%quotes.length;
},3000);

/* TYPEWRITER */
const texts = [
"Welcome to the Youth Association",
"Prayer Meeting Friday 6PM",
"Bible Study Wednesday 6:30PM"
];

let i=0, j=0;

function type(){
    if(j < texts[i].length){
        document.getElementById("typewriter").textContent += texts[i][j++];
        setTimeout(type,50);
    } else {
        setTimeout(()=>{
            document.getElementById("typewriter").textContent="";
            j=0;
            i=(i+1)%texts.length;
            type();
        },2000);
    }
}
type();

/* MOVER */
const mover = [
"Welcome to True Faith Church Youth",
"Friday Prayer 6PM",
"Conference Coming Soon"
];

document.getElementById("mover-text").textContent = mover.join(" | ");

/* FIXED VOICE READER (reads EXACT panel text) */
function readAnnouncement(){
    speechSynthesis.cancel();

    const panelText = document.getElementById("typewriter").textContent;
    const moverText = mover.join(", ");

    const fullText = panelText + ". " + moverText;

    const speech = new SpeechSynthesisUtterance(fullText);
    speech.rate = 0.9;

    speechSynthesis.speak(speech);
}

</script>

</body>
</html>
