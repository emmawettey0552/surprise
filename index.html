<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Faith Church Youth Association</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f6f9;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:100%;
    margin:auto;
    background:#fff;
}

/* HEADER */
.header{
    position:relative;
    text-align:center;
    padding:60px 15px 30px;
    background:linear-gradient(135deg,#b30000,#ff4d4d);
    color:white;
}

.header img{
    width:60px;
    position:absolute;
    top:10px;
}

.logo-left{left:10px;}
.logo-right{right:10px;}

.header h1{font-size:18px;}
.header h2{font-size:13px;}

/* MOVER */
.mover-container{
    overflow:hidden;
    background:#800000;
    color:white;
}

.mover{
    white-space:nowrap;
    padding:10px;
    animation:scroll 20s linear infinite;
}

@keyframes scroll{
    from{transform:translateX(100%)}
    to{transform:translateX(-100%)}
}

/* SLIDER */
.banner{
    position:relative;
    width:100%;
    height:220px;
    overflow:hidden;
}

.slides{
    display:flex;
    width:300%;
    height:100%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes slide{
    0%,30%{transform:translateX(0);}
    33%,63%{transform:translateX(-100%);}
    66%,100%{transform:translateX(-200%);}
}

/* QUOTE */
.quote-carousel{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    color:#fff;
    padding:8px 10px;
    border-radius:6px;
    font-size:12px;
    text-align:center;
    max-width:90%;
}

/* PANEL */
.announcement-panel{
    padding:20px;
    text-align:center;
}

.screen{
    background:black;
    color:#00ff9c;
    padding:10px;
    border-radius:8px;
    min-height:50px;
    font-family:monospace;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    background:#b30000;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* BIBLE */
.bible-section{
    padding:20px;
    text-align:center;
}

.verse-box{
    background:#fff3f3;
    border-left:5px solid #b30000;
    padding:10px;
    margin:10px auto;
    border-radius:8px;
    max-width:95%;
}

.verse{font-style:italic;}

/* MEMBERS */
.members{
    padding:20px;
    text-align:center;
}

.member-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.member{
    width:120px;
}

.member img{
    width:90px;
    height:90px;
    border-radius:50%;
}

/* FOOTER */
.footer{
    background:#b30000;
    color:white;
    text-align:center;
    padding:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <img src="images.jpeg" class="logo-left">
    <img src="images.jpeg" class="logo-right">
    <h1>True Faith Church International</h1>
    <h2>Youth Association</h2>
</div>

<!-- MOVER -->
<div class="mover-container">
    <div class="mover" id="mover-text"></div>
</div>

<!-- SLIDER -->
<div class="banner">
    <div class="slides">
        <img src="file_00000000386071f6857c6b16586d46ed.png">
        <img src="file_00000000386071f6857c6b16586d46ed.png">
        <img src="file_00000000386071f6857c6b16586d46ed.png">
    </div>
    <div class="quote-carousel" id="quote"></div>
</div>

<!-- PANEL -->
<section class="announcement-panel">
    <h3>📢 Announcements</h3>
    <div class="screen"><span id="typewriter"></span></div>

    <button onclick="readAnnouncement()">🔊 Read Announcement</button>
    <button onclick="toggleMusic()">🎵 Play / Pause Music</button>
</section>

<!-- BIBLE -->
<section class="bible-section">
    <h3>📖 Bible Insight</h3>

    <div class="verse-box">
        <h4 id="verse-title"></h4>
        <p class="verse" id="verse-text"></p>
        <p id="verse-explain"></p>
    </div>

    <button onclick="readVerse()">🔊 Read Bible</button>
</section>

<!-- MEMBERS -->
<div class="members">
    <h3>Executive Members</h3>

    <div class="member-grid">
        <div class="member">
            <img src="member1.jpg">
            <p>Sir John</p>
        </div>
        <div class="member">
            <img src="member2.jpg">
            <p>Mr. Samuel</p>
        </div>
    </div>
</div>

<div class="footer">
© 2026 True Faith Church Youth Association 
</div>

</div>

<!-- AUDIO -->
<audio id="bg-music" loop>
    <source src="Honhom_Nwom(48k).mp3" type="audio/mpeg">
</audio>

<script>

/* QUOTES WITH FULL REFERENCES */
const quotes=[
"Matthew 5:14 – You are the light of the world.",
"Matthew 5:16 – Let your light shine before men.",
"Philippians 4:13 – I can do all things through Christ."
];

let q=0;
setInterval(()=>{
    document.getElementById("quote").textContent=quotes[q];
    q=(q+1)%quotes.length;
},3000);

/* TYPEWRITER */
const texts=[
"Welcome to True Faith Youth.",
"Friday Prayer 6PM.",
"Stay connected and prayerful."
];

let i=0,j=0;
function type(){
    let el=document.getElementById("typewriter");
    if(j<texts[i].length){
        el.textContent+=texts[i][j++];
        setTimeout(type,40);
    }else{
        setTimeout(()=>{
            el.textContent="";
            j=0;
            i=(i+1)%texts.length;
            type();
        },2000);
    }
}
type();

/* MOVER */
document.getElementById("mover-text").textContent=
"Welcome ✦ Prayer ✦ Youth ✦ Faith ✦ Jesus";

/* BIBLE */
const bible=[
{
title:"1 Peter 4:7",
text:"The end of all things is near. Be alert and sober so that you may pray.",
explain:"Stay focused, disciplined, and prayerful."
},
{
title:"2 Peter 3:17",
text:"Be on your guard so you are not carried away by error.",
explain:"Protect your faith and stay grounded."
}
];

let b=0;
function showVerse(){
    document.getElementById("verse-title").textContent=bible[b].title;
    document.getElementById("verse-text").textContent=bible[b].text;
    document.getElementById("verse-explain").textContent=bible[b].explain;
    b=(b+1)%bible.length;
}
setInterval(showVerse,5000);
showVerse();

/* MUSIC BUTTON */
const music=document.getElementById("bg-music");

function toggleMusic(){
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

/* VOICE */
function readAnnouncement(){
    speechSynthesis.cancel();
    music.pause();

    let text=document.getElementById("typewriter").textContent;
    let speech=new SpeechSynthesisUtterance(text);
    speech.rate=0.9;
    speechSynthesis.speak(speech);
}

function readVerse(){
    speechSynthesis.cancel();
    music.pause();

    let full=
    document.getElementById("verse-title").textContent+" "+
    document.getElementById("verse-text").textContent+" "+
    document.getElementById("verse-explain").textContent;

    let speech=new SpeechSynthesisUtterance(full);
    speech.rate=0.9;
    speechSynthesis.speak(speech);
}

</script>

</body>
    </html>
