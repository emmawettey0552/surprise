      <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Faith Church International of Ghana - Youth Association</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6f9;
    animation: fadeInBody 1.5s ease-in-out;
}

@keyframes fadeInBody {
    from { opacity: 0; }
    to { opacity: 1; }
}

.container {
    width: 90%;
    max-width: 1200px;
    margin: 20px auto;
    background: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border-radius: 12px;
    overflow: hidden;
}

/* HEADER */
.header {
    position: relative;
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #b30000, #ff4d4d);
    color: white;
}

.header img {
    width: clamp(50px, 10vw, 90px);
    position: absolute;
    top: 20px;
}

.logo-left { left: 20px; }
.logo-right { right: 20px; }

.header h1 {
    font-size: clamp(22px, 5vw, 34px);
}

.header h2 {
    font-size: clamp(14px, 3vw, 20px);
}

/* MOVER */
.mover-container {
    width: 100%;
    overflow: hidden;
    background: #b30000;
    color: #fff;
    padding: 10px 0;
    border-top: 3px solid gold;
    border-bottom: 3px solid gold;
}

.mover {
    white-space: nowrap;
    animation: scrollText 25s linear infinite;
}

.mover span {
    padding-left: 100%;
}

@keyframes scrollText {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* BANNER */
.banner {
    position: relative;
}

.banner img {
    width: 100%;
    height: clamp(200px, 50vw, 420px);
    object-fit: cover;
}

.quote-carousel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 10px 15px;
    border-radius: 8px;
}

/* ANNOUNCEMENT PANEL */
.announcement-panel {
    padding: 40px 20px;
    text-align: center;
}

.screen {
    background: black;
    color: #00ff9c;
    padding: 20px;
    border-radius: 10px;
    max-width: 800px;
    margin: auto;
    font-family: monospace;
}

/* MEMBERS */
.members {
    padding: 40px 20px;
}

.member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
}

.member {
    text-align: center;
}

.member img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: #b30000;
    color: white;
}

/* MOBILE */
@media(max-width:768px){
    .header img {
        position: static;
        display: block;
        margin: auto;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <img src="images.jpeg" class="logo-left">
    <img src="images.jpeg" class="logo-right">
    <h1>True Faith Church International of Ghana</h1>
    <h2>Youth Association</h2>
</div>

<!-- MOVER -->
<div class="mover-container">
    <div class="mover">
        <span id="mover-text"></span>
    </div>
</div>

<!-- BANNER -->
<div class="banner">
    <img src="file000000.png">
    <div class="quote-carousel" id="quote"></div>
</div>

<!-- PANEL -->
<section class="announcement-panel">
    <h2>📢 Youth Announcements</h2>
    <div class="screen">
        <span id="typewriter"></span><span>|</span>
    </div>
</section>

<!-- MEMBERS -->
<div class="members">
    <h2>Executive Members</h2>
    <div class="member-grid">
        <div class="member">
            <img src="member1.jpg">
            <h4>John Doe</h4>
            <p>Organizer</p>
        </div>
        <div class="member">
            <img src="member2.jpg">
            <h4>Jane Smith</h4>
            <p>Treasurer</p>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 True Faith Church International of Ghana – Youth Association
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

/* QUOTES */
const quotes = [
"You are the light of the world – Matthew 5:14",
"Let your light shine – Matthew 5:16",
"I can do all things – Philippians 4:13"
];

let q = 0;
setInterval(()=>{
    document.getElementById("quote").textContent = quotes[q];
    q = (q+1)%quotes.length;
},3000);

/* TYPEWRITER */
const texts = [
"Welcome to the Youth Association",
"Prayer Meeting Friday 6PM",
"Bible Study Wednesday 6:30PM"
];

let i=0, j=0;
function type(){
    if(j < texts[i].length){
        document.getElementById("typewriter").textContent += texts[i][j++];
        setTimeout(type,50);
    } else {
        setTimeout(()=>{
            document.getElementById("typewriter").textContent="";
            j=0;
            i=(i+1)%texts.length;
            type();
        },2000);
    }
}
type();

/* MOVER */
const mover = [
"Welcome to True Faith Church Youth",
"Friday Prayer 6PM",
"Conference Coming Soon"
];
document.getElementById("mover-text").textContent = mover.join(" | ");

});
</script>

</body>
</html>
