<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Faith Church International of Ghana - Youth Association</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f6f9;
            animation: fadeInBody 1.5s ease-in-out;
        }

        @keyframes fadeInBody {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Header */
        .header {
            position: relative;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #b30000, #ff4d4d);
            color: white;
        }

        .header img {
            width: 90px;
            position: absolute;
            top: 20px;
        }

        .logo-left { left: 20px; }
        .logo-right { right: 20px; }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
        }

        .header h2 {
            font-size: 20px;
            font-weight: 300;
            margin-top: 10px;
        }

        /* Banner Section */
        .banner {
            position: relative;
            overflow: hidden;
        }

        .banner img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            animation: kenBurns 20s infinite alternate ease-in-out;
        }

        @keyframes kenBurns {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .quote-carousel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            max-width: 80%;
            transition: opacity 0.5s ease;
        }

        /* Announcement Panel */
        .announcement-panel {
            padding: 40px 20px;
            text-align: center;
            background: #f9f9f9;
        }

        .announcement-panel h2 {
            color: #b30000;
            margin-bottom: 20px;
        }

        .screen {
            background: #000;
            color: #00ff9c;
            font-family: "Courier New", monospace;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            text-align: left;
            min-height: 120px;
            box-shadow: 0 0 20px rgba(0, 255, 156, 0.5);
        }

        .cursor {
            display: inline-block;
            font-weight: bold;
            color: #00ff9c;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        /* Members Section */
        .members {
            padding: 40px 20px;
        }

        .members h2 {
            text-align: center;
            color: #b30000;
            margin-bottom: 30px;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
        }

        .member {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .member:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .member img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 3px solid #b30000;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #b30000;
            color: white;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header img { width: 60px; }
            .header h1 { font-size: 24px; }
            .header h2 { font-size: 16px; }
            .banner img { height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <img src="images.jpeg" alt="Church Logo" class="logo-left">
        <img src="images.jpeg" alt="Church Logo" class="logo-right">
        <h1>True Faith Church International of Ghana</h1>
        <h2>Youth Association</h2>
    </div>

    <!-- Banner -->
    <div class="banner">
        <img src="file_00000000386071f6857c6b16586d46ed.png" alt="Event Banner">
        <div class="quote-carousel" id="quote">
            “You are the light of the world.” – Matthew 5:14
        </div>
    </div>

    <!-- Announcement Panel -->
    <section class="announcement-panel">
        <h2>📢 Youth Announcements</h2>
        <div class="screen">
            <span id="typewriter"></span><span class="cursor">|</span>
        </div>
    </section>

    <!-- Members Section -->
    <div class="members">
        <h2>Executive Members</h2>
        <div class="member-grid">
            <div class="member">
                <img src="member1.jpg" alt="Organizer">
                <h4>John Doe</h4>
                <p>Organizer</p>
            </div>
            <div class="member">
                <img src="member2.jpg" alt="Treasurer">
                <h4>Jane Smith</h4>
                <p>Treasurer</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 True Faith Church International of Ghana – Youth Association. All Rights Reserved.
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    // Quote Carousel
    const quotes = [
        "“You are the light of the world.” – Matthew 5:14",
        "“Let your light shine before others.” – Matthew 5:16",
        "“I can do all things through Christ.” – Philippians 4:13",
        "“Trust in the Lord with all your heart.” – Proverbs 3:5"
    ];

    let qIndex = 0;
    const quoteElement = document.getElementById("quote");

    setInterval(() => {
        qIndex = (qIndex + 1) % quotes.length;
        quoteElement.style.opacity = 0;
        setTimeout(() => {
            quoteElement.textContent = quotes[qIndex];
            quoteElement.style.opacity = 1;
        }, 500);
    }, 5000);

    // Typewriter Announcement Panel
    const announcements = [
        "Welcome to the True Faith Church International of Ghana Youth Association.",
        "Youth Prayer Meeting holds every Friday at 6:00 PM.",
        "Bible Study takes place every Wednesday at 6:30 PM.",
        "Youth Impact Conference is coming soon. Stay tuned!",
        "Remember: You are the light of the world – Matthew 5:14-16."
    ];

    const typewriter = document.getElementById("typewriter");
    let aIndex = 0;
    let charIndex = 0;
    let deleting = false;

    function typeEffect() {
        const text = announcements[aIndex];

        if (!deleting && charIndex < text.length) {
            typewriter.textContent += text.charAt(charIndex++);
            setTimeout(typeEffect, 50);
        } else if (deleting && charIndex > 0) {
            typewriter.textContent = text.substring(0, --charIndex);
            setTimeout(typeEffect, 25);
        } else {
            deleting = !deleting;
            if (!deleting) aIndex = (aIndex + 1) % announcements.length;
            setTimeout(typeEffect, 1500);
        }
    }

    typeEffect();
});
</script>

</body>
</html>
