<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Faith Church Youth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f6f9;
    overflow-x:hidden; /* 🔥 FIX OVERFLOW */
}

.container{
    width:100%;
    max-width:100%;
    margin:auto;
    background:#fff;
}

/* HEADER */
.header{
    text-align:center;
    padding:40px 15px;
    background:linear-gradient(135deg,#b30000,#ff4d4d);
    color:white;
}

.header h1{
    font-size:18px;
}

.header h2{
    font-size:13px;
}

/* MOVER */
.mover-container{
    overflow:hidden;
    background:#800000;
    color:white;
}

.mover{
    display:inline-block;
    white-space:nowrap;
    padding:10px;
    animation:scroll 20s linear infinite;
}

@keyframes scroll{
    from{transform:translateX(100%)}
    to{transform:translateX(-100%)}
}

/* 🔥 BANNER SLIDER */
.banner{
    position:relative;
    width:100%;
    height:220px;
    overflow:hidden;
}

.slides{
    display:flex;
    width:300%;
    height:100%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes slide{
    0%{transform:translateX(0)}
    33%{transform:translateX(0)}
    36%{transform:translateX(-100%)}
    66%{transform:translateX(-100%)}
    69%{transform:translateX(-200%)}
    100%{transform:translateX(-200%)}
}

.quote-carousel{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    color:white;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
}

/* PANEL */
.announcement-panel{
    padding:20px;
    text-align:center;
}

.screen{
    background:black;
    color:#00ff9c;
    padding:10px;
    border-radius:8px;
    font-family:monospace;
    min-height:50px;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    background:#b30000;
    color:white;
    border-radius:6px;
}

/* BIBLE */
.bible-section{
    padding:20px;
    text-align:center;
}

.verse-box{
    background:#fff3f3;
    border-left:5px solid #b30000;
    padding:10px;
    margin:10px auto;
    border-radius:8px;
    max-width:95%;
}

.verse{
    font-style:italic;
}

/* MEMBERS */
.members{
    padding:20px;
    text-align:center;
}

.member-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.member{
    width:120px;
}

.member img{
    width:90px;
    height:90px;
    border-radius:50%;
}

/* FOOTER */
.footer{
    background:#b30000;
    color:white;
    text-align:center;
    padding:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>True Faith Church International</h1>
    <h2>Youth Association</h2>
</div>

<div class="mover-container">
    <div class="mover" id="mover-text"></div>
</div>

<!-- 🔥 SLIDER -->
<div class="banner">
    <div class="slides">
        <img src="banner1.jpg">
        <img src="banner2.jpg">
        <img src="banner3.jpg">
    </div>
    <div class="quote-carousel" id="quote"></div>
</div>

<section class="announcement-panel">
    <h3>📢 Announcements</h3>
    <div class="screen"><span id="typewriter"></span></div>
    <button onclick="readAnnouncement()">🔊 Read</button>
</section>

<section class="bible-section">
    <h3>📖 Bible Insight</h3>

    <div class="verse-box">
        <h4 id="verse-title"></h4>
        <p class="verse" id="verse-text"></p>
        <p id="verse-explain"></p>
    </div>

    <button onclick="readVerse()">🔊 Read Verse</button>
</section>

<div class="members">
    <h3>Executive Members</h3>
    <div class="member-grid">
        <div class="member">
            <img src="member1.jpg">
            <p>Sir John</p>
        </div>
        <div class="member">
            <img src="member2.jpg">
            <p>Mr. Samuel</p>
        </div>
    </div>
</div>

<div class="footer">
© 2026 True Faith Youth
</div>

</div>

<script>

/* QUOTES */
const quotes=[
"You are the light of the world",
"Let your light shine",
"I can do all things"
];

let q=0;
setInterval(()=>{
    document.getElementById("quote").textContent=quotes[q];
    q=(q+1)%quotes.length;
},3000);

/* TYPEWRITER */
const texts=[
"Welcome to Church Youth",
"Friday Prayer 6PM",
"Stay Blessed"
];

let i=0,j=0;
function type(){
    const el=document.getElementById("typewriter");
    if(j<texts[i].length){
        el.textContent+=texts[i][j++];
        setTimeout(type,40);
    }else{
        setTimeout(()=>{
            el.textContent="";
            j=0;
            i=(i+1)%texts.length;
            type();
        },2000);
    }
}
type();

/* MOVER */
document.getElementById("mover-text").textContent=
"Welcome ✦ Prayer ✦ Youth ✦ Faith ✦ Jesus";

/* BIBLE */
const bible=[
{
title:"1 Peter 4:7",
text:"Be alert and sober so you can pray.",
explain:"Stay focused and prayerful."
},
{
title:"2 Peter 3:17",
text:"Be on your guard.",
explain:"Protect your faith."
}
];

let b=0;
function showVerse(){
    document.getElementById("verse-title").textContent=bible[b].title;
    document.getElementById("verse-text").textContent=bible[b].text;
    document.getElementById("verse-explain").textContent=bible[b].explain;
    b=(b+1)%bible.length;
}
setInterval(showVerse,5000);
showVerse();

/* VOICE */
function readAnnouncement(){
    speechSynthesis.cancel();
    const text=document.getElementById("typewriter").textContent;
    const speech=new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(speech);
}

function readVerse(){
    speechSynthesis.cancel();
    const full=
    document.getElementById("verse-title").textContent+" "+
    document.getElementById("verse-text").textContent+" "+
    document.getElementById("verse-explain").textContent;

    const speech=new SpeechSynthesisUtterance(full);
    speechSynthesis.speak(speech);
}

</script>

</body>
    </html>
