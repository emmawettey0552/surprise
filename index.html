<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Free Church International Youth Association</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            animation: fadeInBody 1.5s ease-in-out;
        }

        /* Fade-in animation */
        @keyframes fadeInBody {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        /* Header */
        .header {
            position: relative;
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #b30000, #ff4d4d);
            color: white;
            overflow: hidden;
        }

        .header img {
            width: 80px;
            position: absolute;
            top: 20px;
        }

        /* Logo Animations */
        .logo-left {
            left: 20px;
            animation: slideInLeft 1.5s ease forwards;
        }

        .logo-right {
            right: 20px;
            animation: slideInRight 1.5s ease forwards;
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .header h1 {
            font-size: 36px;
            animation: zoomIn 1.5s ease;
        }

        .header h2 {
            font-weight: 300;
            margin-top: 5px;
            animation: fadeInUp 2s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Banner Section */
        .banner {
            position: relative;
            overflow: hidden;
        }

        .banner img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            animation: kenBurns 20s infinite alternate ease-in-out;
        }

        /* Ken Burns Effect */
        @keyframes kenBurns {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .quote-carousel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            max-width: 80%;
            animation: fadeInUp 2s ease;
        }

        /* Members Section */
        .members {
            padding: 40px 20px;
        }

        .members h2 {
            text-align: center;
            color: #b30000;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .member {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(40px);
            opacity: 0;
            transition: all 0.5s ease;
        }

        /* Hover Animation */
        .member:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .member img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 3px solid #b30000;
        }

        .member h4 {
            margin-bottom: 5px;
        }

        .member p {
            color: #777;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            background: #b30000;
            color: white;
        }

        /* Scroll Reveal */
        .show {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <img src="logo.png" alt="Church Logo" class="logo-left">
        <img src="logo.png" alt="Church Logo" class="logo-right">
        <h1>G-Free Church International</h1>
        <h2>Youth Association</h2>
    </div>

    <!-- Banner Section -->
    <div class="banner">
        <img src="event.jpg" alt="Event Banner">
        <div class="quote-carousel" id="quote">
            “You are the light of the world. A city set on a hill cannot be hidden.” – Matthew 5:14
        </div>
    </div>

    <!-- Members Section -->
    <div class="members">
        <h2 class="reveal">Executive Members</h2>
        <div class="member-grid">
            <div class="member reveal">
                <img src="member1.jpg" alt="Organizer">
                <h4>John Doe</h4>
                <p>Organizer</p>
            </div>
            <div class="member reveal">
                <img src="member2.jpg" alt="Treasurer">
                <h4>Jane Smith</h4>
                <p>Treasurer</p>
            </div>
            <!-- Add more members as needed -->
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        G-Free Church International Youth Association | Contact: +233 XXX XXX XXX
    </div>
</div>
