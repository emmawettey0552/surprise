<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Faith Church International of Ghana - Youth Association</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f6f9;
            animation: fadeInBody 1.5s ease-in-out;
        }

        @keyframes fadeInBody {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            position: relative;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #b30000, #ff4d4d);
            color: white;
        }

        .header img {
            width: 90px;
            position: absolute;
            top: 20px;
        }

        .logo-left { left: 20px; }
        .logo-right { right: 20px; }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
        }

        .header h2 {
            font-size: 20px;
            font-weight: 300;
            margin-top: 10px;
        }

        /* BANNER */
        .banner {
            position: relative;
            overflow: hidden;
        }

        .banner img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            animation: kenBurns 20s infinite alternate ease-in-out;
        }

        @keyframes kenBurns {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .quote-carousel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 18px;
            max-width: 80%;
            transition: opacity 0.5s ease;
        }

        /* ANNOUNCEMENT */
        .announcement-panel {
            padding: 40px 20px;
            text-align: center;
            background: #f9f9f9;
        }

        .announcement-panel h2 {
            color: #b30000;
            margin-bottom: 20px;
        }

        .screen {
            background: black;
            color: #00ff9c;
            font-family: monospace;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            text-align: left;
            min-height: 120px;
            box-shadow: 0 0 20px rgba(0,255,156,0.5);
        }

        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%,50%,100% { opacity: 1; }
            25%,75% { opacity: 0; }
        }

        /* MEMBERS */
        .members {
            padding: 40px 20px;
        }

        .members h2 {
            text-align: center;
            color: #b30000;
            margin-bottom: 30px;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
        }

        .member {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .member:hover {
            transform: translateY(-10px);
        }

        .member img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #b30000;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            background: #b30000;
            color: white;
        }

        /* RESPONSIVE FIXED */
        @media (max-width: 768px) {
            .header img {
                width: 60px;
                position: static;
                display: block;
                margin: 0 auto 10px;
            }

            .header h1 { font-size: 24px; }
            .header h2 { font-size: 16px; }
            .banner img { height: 250px; }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="images.jpeg" class="logo-left" alt="Logo">
        <img src="images.jpeg" class="logo-right" alt="Logo">
        <h1>True Faith Church International of Ghana</h1>
        <h2>Youth Association</h2>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <img src="file_00000000386071f6857c6b16586d46ed.png" alt="Banner">
        <div class="quote-carousel" id="quote">Loading quote...</div>
    </div>

    <!-- ANNOUNCEMENT -->
    <section class="announcement-panel">
        <h2>📢 Youth Announcements</h2>
        <div class="screen">
            <span id="typewriter"></span><span class="cursor">|</span>
        </div>
    </section>

    <!-- MEMBERS -->
    <div class="members">
        <h2>Executive Members</h2>
        <div class="member-grid">
            <div class="member">
                <img src="member1.jpg" alt="">
                <h4>John Doe</h4>
                <p>Organizer</p>
            </div>

            <div class="member">
                <img src="member2.jpg" alt="">
                <h4>Jane Smith</h4>
                <p>Treasurer</p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        © 2026 True Faith Church International of Ghana – Youth Association
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const quotes = [
        "You are the light of the world. – Matthew 5:14",
        "Let your light shine. – Matthew 5:16",
        "I can do all things through Christ. – Philippians 4:13",
        "Trust in the Lord. – Proverbs 3:5"
    ];

    const announcements = [
        "Welcome to the True Faith International Church Of Ghana Youth Association.",
        "Prayer Meeting every Friday 6PM.",
        "Bible Study every Wednesday 6:30PM.",
        "Youth Conference coming soon.",
        "Stay blessed always."
    ];

    const quoteEl = document.getElementById("quote");
    const typewriter = document.getElementById("typewriter");

    let qIndex = 0;
    let aIndex = 0;
    let charIndex = 0;
    let deleting = false;

    /* QUOTES */
    setInterval(() => {
        qIndex = (qIndex + 1) % quotes.length;
        quoteEl.style.opacity = 0;

        setTimeout(() => {
            quoteEl.textContent = quotes[qIndex];
            quoteEl.style.opacity = 1;
        }, 500);
    }, 5000);

    /* TYPEWRITER */
    function typeEffect() {
        let text = announcements[aIndex];

        if (!deleting && charIndex < text.length) {
            typewriter.textContent += text.charAt(charIndex++);
            setTimeout(typeEffect, 50);
        } else if (deleting && charIndex > 0) {
            typewriter.textContent = text.substring(0, --charIndex);
            setTimeout(typeEffect, 25);
        } else {
            deleting = !deleting;

            if (!deleting) {
                aIndex = (aIndex + 1) % announcements.length;
            }

            setTimeout(typeEffect, 1500);
        }
    }

    typeEffect();

    /* AUTO READER */
    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1;
        msg.pitch = 1;
        window.speechSynthesis.speak(msg);
    }

    setInterval(() => {
        speak(announcements[aIndex]);
    }, 7000);

});
</script>

</body>
</html>
